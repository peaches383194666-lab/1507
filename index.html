<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .highlight { background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        th, td {
            border-bottom: 1px solid #e2e8f0;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.18);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(15, 23, 42, 0.28);
        }

        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table-responsive table {
            min-width: 720px;
        }

        .table-responsive th,
        .table-responsive td {
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .table-responsive th,
            .table-responsive td {
                white-space: normal;
            }
        }

        .fade-in {
            animation: fadeIn 0.45s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-hover:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        tbody tr {
            animation: slideIn 0.25s ease-out;
            animation-fill-mode: both;
        }
        tbody tr:nth-child(1) { animation-delay: 0.06s; }
        tbody tr:nth-child(2) { animation-delay: 0.12s; }
        tbody tr:nth-child(3) { animation-delay: 0.18s; }
        tbody tr:nth-child(4) { animation-delay: 0.24s; }
        tbody tr:nth-child(5) { animation-delay: 0.3s; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%94a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");

            background-position: right 1rem center;
            background-size: 1rem;
            padding-right: 3rem;
        }

</head>
<body class="bg-slate-50 text-slate-900">

            populateCityFilter();

            renderTable(jobs);
            updateStats();

            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('scale-105');
                });
                input.addEventListener('blur', function() {
                    this.parentElement.classList.remove('scale-105');
                });
            });
        });

            // 隐藏所有tab内容

                el.classList.remove('text-blue-600', 'border-b-4', 'border-blue-600', 'bg-blue-50');
                el.classList.add('text-gray-600');
            });

            // 显示选中的tab

                document.getElementById('contentAllJobs').classList.add('active');
                document.getElementById('tabAllJobs').classList.add('text-blue-600', 'border-b-4', 'border-blue-600', 'bg-blue-50');

    {level:"60", company:"中国电科十四所旗下国睿防务公司", city:"南京", salary:"55", remark:"反无人机雷达总体工程师"},
    {level:"60", company:"中国航空工业集团下属南京航空工业宏光空降装备有限公司", city:"南京", salary:"55", remark:"技术岗"},
    {level:"60", company:"摩登天空", city:"", salary:"48", remark:""},
    {level:"60", company:"康德学校/上海国际学校", city:"", salary:"48", remark:""},
    {level:"60", company:"北京服装学院", city:"北京", salary:"45", remark:""},
    {level:"60", company:"《家族企业》杂志", city:"", salary:"40-45", remark:""},
];

        function getCityTokens(city) {
            if (!city) return [];
            return city
                .split(/[\/、,+]|及/)
                .map(token => token.trim())
                .filter(Boolean);
        }

        function populateCityFilter() {
            const citySelect = document.getElementById('filterCity');
            const citySet = new Set();

            jobs.forEach(job => {
                getCityTokens(job.city).forEach(city => citySet.add(city));
            });

            const cityOptions = Array.from(citySet).sort((a, b) => a.localeCompare(b, 'zh-Hans-CN', { sensitivity: 'base' }));
            cityOptions.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        }

        function renderTable(filteredJobs) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const fragment = document.createDocumentFragment();

            if (filteredJobs.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan="5" class="p-12 text-center text-gray-500 text-lg">没有找到匹配的岗位</td>`;
                fragment.appendChild(row);
            } else {
                filteredJobs.forEach(job => {
                    const levelText = job.level === '100' ? '非常稳' : job.level === '80' ? '很稳' : '较大概率';
                    const levelColor = job.level === '100' ? 'text-green-600' : job.level === '80' ? 'text-blue-600' : 'text-orange-600';
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition';
                    row.innerHTML = `
                        <td class="p-4 font-medium ${levelColor}" data-label="概率等级">${levelText}</td>
                        <td class="p-4 font-medium text-slate-900" data-label="公司 / 单位">
                            <div class="flex items-center justify-between gap-3">
                                <span class="min-w-0 overflow-hidden text-ellipsis whitespace-nowrap">${job.company}</span>
                                <div class="flex items-center gap-2">
                                    <a href="https://www.tianyancha.com/search?key=${encodeURIComponent(job.company)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-6 h-6 bg-blue-500 hover:bg-blue-600 text-white rounded text-[10px] transition" title="天眼查">天</a>
                                    <a href="https://aiqicha.baidu.com/s?q=${encodeURIComponent(job.company)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-6 h-6 bg-red-500 hover:bg-red-600 text-white rounded text-[10px] transition" title="爱企查">爱</a>
                                    <a href="https://www.baidu.com/s?wd=${encodeURIComponent(job.company)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-6 h-6 bg-orange-500 hover:bg-orange-600 text-white rounded text-[10px] transition" title="百度搜索">百</a>
                                </div>
                            </div>
                        </td>
                        <td class="p-4 text-center" data-label="城市">${job.city}</td>
                        <td class="p-4 text-right font-semibold text-green-600" data-label="薪资">${job.salary}</td>
                        <td class="p-4" data-label="岗位 / 备注">${job.remark}</td>
                    `;
                    fragment.appendChild(row);
                });
            }

            tbody.appendChild(fragment);
            updateStats(filteredJobs.length);
        }

        function updateStats(filteredCount) {
            document.getElementById('filteredCount').textContent = filteredCount;
            document.getElementById('totalCount').textContent = jobs.length;
        }

        function isFinanceJob(job) {
            // 根据type属性判断是否是金融类岗位
            if (job.type !== undefined) {
                return job.type === 'finance';
            }
            // 备用：关键字匹配
            const financeKeywords = ['银行', '证券', '基金', '资本', '投资', '保险', '金租', '信托', '期货', '交易', '融资', '财富', '资产', '金融', '平安人寿', '浦发', '招商', '中信', '光大', '财达', '东吴', '海川', '申万', '兴业', '上海证券', '西南证券', '华龙', '拉卡拉', '理财', '募资', '承销', '承做', '固收', 'ir', 'CVC', '战投'];
            const text = (job.company + job.remark).toLowerCase();
            return financeKeywords.some(keyword => text.includes(keyword.toLowerCase()));
        }

        function parseSalaryRange(salaryStr) {
            // 解析价格字符串，返回 {min, max}
            if (!salaryStr) return { min: 0, max: Infinity };
            
            const parts = salaryStr.split('-').map(s => parseInt(s.trim()));
            if (parts.length === 2) {
                return { min: parts[0], max: parts[1] };
            } else if (parts.length === 1 && !isNaN(parts[0])) {
                return { min: parts[0], max: parts[0] };
            }
            return { min: 0, max: Infinity };
        }

        function filterTable() {
            const type = document.getElementById('filterType').value;
            const level = document.getElementById('filterLevel').value;
            const city = document.getElementById('filterCity').value;
            const minSalary = parseInt(document.getElementById('minSalary').value) || 0;
            const maxSalary = parseInt(document.getElementById('maxSalary').value) || Infinity;
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();

            let filtered = jobs;

            // 类型筛选
            if (type) {
                filtered = filtered.filter(j => {
                    if (type === 'finance') return isFinanceJob(j);
                    if (type === 'other') return !isFinanceJob(j);
                    return true;
                });
            }

            if (level) filtered = filtered.filter(j => j.level === level);
            if (city) filtered = filtered.filter(j => j.city.includes(city));
            
            // 价格范围筛选
            filtered = filtered.filter(j => {
                const range = parseSalaryRange(j.salary);
                // 判断岗位价格范围与筛选范围是否有重叠
                return !(range.max < minSalary || range.min > maxSalary);
            });
            
            if (keyword) {
                filtered = filtered.filter(j => 
                    (j.company + j.remark + j.city).toLowerCase().includes(keyword)
                );
            }

            renderTable(filtered);
        }

        function clearFilters() {
            document.getElementById('filterType').value = '';
            document.getElementById('filterLevel').value = '';
            document.getElementById('filterCity').value = '';
            document.getElementById('minSalary').value = '';
            document.getElementById('maxSalary').value = '';
            document.getElementById('searchInput').value = '';
            renderTable(jobs);
        }

        // 实时筛选
        document.getElementById('filterType').addEventListener('change', filterTable);
        document.getElementById('filterLevel').addEventListener('change', filterTable);
        document.getElementById('filterCity').addEventListener('change', filterTable);
        document.getElementById('minSalary').addEventListener('input', filterTable);
        document.getElementById('maxSalary').addEventListener('input', filterTable);
        document.getElementById('searchInput').addEventListener('input', filterTable);

        // 初始化显示：默认无筛选，全部岗位展示
        clearFilters();
    </script>
</body>
</html>
